<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Hall | ElitePrep AI Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Mock Test Specific Styles */
        .exam-meta-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .exam-timer {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--danger);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-card {
            margin-bottom: 25px;
            animation: slideUp 0.4s ease-out;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option-item {
            position: relative;
            cursor: pointer;
        }

        .option-item input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .option-box {
            display: flex;
            align-items: center;
            padding: 10px 18px;
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .option-item:hover .option-box {
            border-color: var(--primary-light);
            background: #f8faff;
        }

        .option-item input:checked + .option-box {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(88, 28, 135, 0.1);
        }

        .exam-actions {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            padding-bottom: 50px;
        }

        .finish-btn {
            padding: 18px 60px;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(88, 28, 135, 0.3);
        }

        .subjective-area {
            width: 100%;
            border-radius: 12px;
            border: 2px solid var(--gray-200);
            padding: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 200px;
            background: white;
            transition: border-color 0.2s;
        }

        .subjective-area:focus {
            outline: none;
            border-color: var(--primary);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .options-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="glass-container" id="main-app">
        <!-- Main Content -->
        <main class="content">
            <section id="exam-hall-section" class="active-section">
                <header class="page-header">
                    <div class="d-flex justify-content-between align-items-center w-100">
                        <div>
                            <h2 id="exam-subject-title">Mock Examination Hall</h2>
                            <p id="exam-meta-info">Please do not refresh or leave this page.</p>
                        </div>
                        <div class="exam-timer">
                            <i data-lucide="clock"></i>
                            <span id="exam-timer-display">--:--</span>
                        </div>
                    </div>
                </header>

                <div id="exam-questions-container">
                    <div class="glass-card card p-5 text-center">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">Loading paper and initializing security protocol...</p>
                    </div>
                </div>

                <div class="exam-actions">
                    <button onclick="submitMockTest()" class="btn-primary finish-btn" id="finish-exam-btn">FINISH &amp; SUBMIT PAPER</button>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/layout.js"></script>
    <script src="assets/js/script.js?v=7"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initExamHall();
        });
    </script>
</body>
</html>
